        var idMap = null;

        function escapeRegExp(string) {
            return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        }

        function replaceAll(str, find, replace) {
            return str.replace(new RegExp(escapeRegExp(find), 'g'), replace);
        }

        // ── Adapted AsyncCallServer for Flask API ──────────────────────────
        function AsyncCallServer(inMethod, inParameters, inDone) {
            var routeMap = {
                'GetBooks':             { url: '/api/books',                                    method: 'GET' },
                'GetSingleBook':        { url: '/api/books/' + (inParameters.inID || ''),       method: 'GET' },
                'GetChapters':          { url: '/api/chapters/' + (inParameters.inBookID != null ? inParameters.inBookID : ''), method: 'GET' },
                'InsertUpdateBook':     { url: '/api/books',                                    method: 'POST' },
                'InsertUpdateChapter':  { url: '/api/chapters',                                 method: 'POST' },
                'CopyBook':             { url: '/api/books/' + (inParameters.inID || '') + '/copy', method: 'POST' },
                'UpdateChapterText':    { url: '/api/chapters/' + (inParameters.id || '') + '/text', method: 'PUT' },
                'UpdateChapterHelp':    { url: '/api/chapters/' + (inParameters.id || '') + '/help', method: 'PUT' },
                'UpdateBookSolution':   { url: '/api/books/' + (inParameters.id || '') + '/solution', method: 'PUT' },
                'UpdateBookDescription':{ url: '/api/books/' + (inParameters.id || '') + '/description', method: 'PUT' },
                'Export':               { url: '/api/export',                                   method: 'GET' }
            };

            var route = routeMap[inMethod];
            if (!route) {
                console.error("Unknown method: " + inMethod);
                return;
            }

            var opts = {
                type: route.method,
                contentType: 'application/json; charset=utf-8',
                dataType: 'json',
                async: true,
                cache: false,
                url: route.url,
                success: function(data) {
                    // Wrap in {d: JSON.stringify(data)} to match ASP.NET WebMethod format
                    inDone({ d: JSON.stringify(data) });
                }
            };

            if (route.method !== 'GET') {
                opts.data = JSON.stringify(inParameters);
            }

            jQuery.ajax(opts);
        }

        // ── Tree display ───────────────────────────────────────────────────
        function _getTreeNode(inNodes, inID) {
            for (let i = 0; i < inNodes.length; i++) {
                if (inNodes[i].chapterid == inID)
                    return inNodes[i];
            }
            return null;
        }

        function doDisplayTree(inChapters) {
            if (inChapters.length < 1)
                return;
            let aNodes = [];
            for (let i = 0; i < inChapters.length; i++) {
                let oChapter = inChapters[i];
                if (!oChapter.location && !oChapter.flagsneeded) {
                    aNodes.push({ level: 0, chapterid: oChapter.chapterid, flagsneeded: null, caption: oChapter.caption });
                    break;
                }
            }

            let iFailsafe = 20;
            while (aNodes.length < inChapters.length && iFailsafe-- > 0) {
                for (let i = 0; i < inChapters.length; i++) {
                    let oChapter = inChapters[i];
                    if (_getTreeNode(aNodes, oChapter.chapterid))
                        continue;
                    let oParentNode = _getTreeNode(aNodes, oChapter.flagsneeded);
                    if (!oParentNode) {
                        continue;
                    }
                    aNodes.push({ level: parseInt(oParentNode.level) + 1, chapterid: oChapter.chapterid, flagsneeded: oChapter.flagsneeded, caption: oChapter.caption });
                }
            }

            let eTree = $(".WorldTree");
            eTree.empty();
            for (let i = 0; i < aNodes.length; i++) {
                let eParent = eTree.find("[data-chapterid='" + aNodes[i].flagsneeded + "']");
                if (eParent.length < 1) {
                    eTree.append("<ul><li data-chapterid='" + aNodes[i].chapterid + "'>" + aNodes[i].caption + "</li></ul>");
                } else {
                    eParent.append("<ul><li data-chapterid='" + aNodes[i].chapterid + "'>" + aNodes[i].caption + "</li></ul>");
                }
            }
        }

        // ── Map display ────────────────────────────────────────────────────
        function doMarkerClick(m) {
            let eContent = QuickPanel(m.target.options.caption, $("#mapid"), { width: '400px', left: "200px", top: "200px" });
            eContent.html(m.target.options.caption);
        }

        function doDisplayMap(inLat, inLon, inChapters) {
            $("#mapid").show();
            idMap = L.map('mapid').setView({ lat: inLat, lon: inLon }, 14);
            var osmUrl = 'https://{s}.tile.osm.org/{z}/{x}/{y}.png',
                osmAttrib = '&copy; <a href="http://openstreetmap.org/copyright">OpenStreetMap</a> contributors',
                osm = L.tileLayer(osmUrl, {
                    maxZoom: 18,
                    minZoom: 1,
                    attribution: osmAttrib,
                    zoomOffset: -1,
                    tileSize: 512
                });
            idMap.addLayer(osm);
            layerMarkers = L.layerGroup().addTo(idMap);

            idMap.on('click', function (e) {
                alert("Lat, Lon : " + e.latlng.lat + ", " + e.latlng.lng);
            });

            for (let i = 0; i < inChapters.length; i++) {
                let oItem = inChapters[i];
                let gps = oItem.locationgps;
                if (!gps)
                    continue;
                let lon = parseFloat(gps.split(',')[1]);
                let lat = parseFloat(gps.split(',')[0]);
                let delta = oItem.locationdelta;
                L.circle([lat, lon], { radius: delta, caption: oItem.id + " - " + oItem.caption }).on('click', doMarkerClick).addTo(idMap);
            }
        }

        // ── Dump / Review panel ────────────────────────────────────────────
        function doDump(inBook) {
            AsyncCallServer("GetSingleBook", { inID: inBook }, function (inBookData) {
                AsyncCallServer("GetChapters", { inBookID: inBook }, function (inChapterData) {
                    let oBook = JSON.parse(inBookData.d).Book[0];
                    let oChapters = JSON.parse(inChapterData.d).Chapters;

                    let eContent = QuickPanel(oBook.caption, null, { width: '80%', left: "100px", top: "100px", maxHeight: "500px" });
                    eContent.html("<h2>" + oBook.caption + "</h2>");
                    oBook.description = replaceAll(oBook.description || '', "\n", "<br>");
                    eContent.append("<div contenteditable='true' class='editable_description' data-id='" + oBook.id + "'>" + oBook.description + "</div>");
                    for (let i = 0; i < oChapters.length; i++) {
                        let oChapter = oChapters[i];
                        eContent.append("<p></p><hr><p></p><h4>" + oChapter.caption + "</h4>");
                        let sText = oChapter.pretext || '';
                        sText = replaceAll(sText, "\n", "<br>");
                        eContent.append("<div contenteditable='true' class='editable_text' data-chaptertitle='" + oChapter.caption + "' data-id='" + oChapter.id + "'>" + sText + "</div>");
                        let sHelp = oChapter.helptext || '';
                        sHelp = replaceAll(sHelp, "\n", "<br>");
                        eContent.append("<div style='clear:both'></div>");
                        eContent.append("<div contenteditable='true' class='editable_help' data-id='" + oChapter.id + "'>" + sHelp + "</div>");
                    }
                    eContent.append("<h3>Questions and answers</h3>");
                    eContent.append("<div style='padding: 4px'><b>" + (oBook.question1 || '') + "</b></div>");
                    eContent.append("<div style='padding: 4px'>" + (oBook.answer1 || '') + "</div>");
                    eContent.append("<div style='padding: 4px'><b>" + (oBook.question2 || '') + "</b></div>");
                    eContent.append("<div style='padding: 4px'>" + (oBook.answer2 || '') + "</div>");
                    eContent.append("<div style='padding: 4px'><b>" + (oBook.question3 || '') + "</b></div>");
                    eContent.append("<div style='padding: 4px'>" + (oBook.answer3 || '') + "</div>");

                    eContent.append("<h3>Help caption</h3>");
                    eContent.append("<div style='padding: 4px'>" + (oBook.helpcaption || '') + "</div>");

                    eContent.append("<h3>Solution</h3>");
                    let sFinalText = replaceAll(oBook.congratulations || '', "\n", "<br>");
                    eContent.append("<div data-id='" + oBook.id + "' class='editable_solution' contenteditable='true'>" + sFinalText + "</div>");

                    // Inline editing handlers
                    $(".editable_text").off("blur").on("blur", function () {
                        let that = $(this);
                        let sText = $(this).html();
                        sText = replaceAll(sText, "<br>", "\n");
                        AsyncCallServer("UpdateChapterText", { id: that.attr("data-id"), pretext: sText }, function () {
                            sText = replaceAll(sText, "\n", "<br>");
                            that.html(sText);
                        });
                    });
                    $(".editable_help").off("blur").on("blur", function () {
                        let that = $(this);
                        let sText = $(this).html();
                        sText = replaceAll(sText, "<br>", "\n");
                        AsyncCallServer("UpdateChapterHelp", { id: that.attr("data-id"), help: sText }, function () {
                            sText = replaceAll(sText, "\n", "<br>");
                            that.html(sText);
                        });
                    });
                    $(".editable_solution").off("blur").on("blur", function () {
                        let that = $(this);
                        let sText = $(this).html();
                        sText = replaceAll(sText, "<br>", "\n");
                        AsyncCallServer("UpdateBookSolution", { id: that.attr("data-id"), solution: sText }, function () {
                            sText = replaceAll(sText, "\n", "<br>");
                            that.html(sText);
                        });
                    });
                    $(".editable_description").off("blur").on("blur", function () {
                        let that = $(this);
                        let sText = $(this).html();
                        sText = replaceAll(sText, "<br>", "\n");
                        AsyncCallServer("UpdateBookDescription", { id: that.attr("data-id"), description: sText }, function () {
                            sText = replaceAll(sText, "\n", "<br>");
                            that.html(sText);
                        });
                    });
                });
            });
        }

        // ── Render chapters ────────────────────────────────────────────────
        function RenderChapters(inBookID, inBookName) {
            let eList = $(".IceList");
            eList.html("Augnablik ...");

            $(".IceList").attr("data-type", "chapters");
            $(".IceList").attr("data-book", inBookID);
            $(".IceList").attr("data-bookname", inBookName);
            $(".IceNewBook").hide();
            $(".IceWorldMap").hide();
            $(".IceCopyBook").show();
            $(".IceNewChapter").show();
            $(".IceDump").show();
            $(".IceGoBack").show();
            $(".IceActors").show();

            AsyncCallServer("GetChapters", { inBookID: inBookID }, function (inData) {
                let oData = JSON.parse(inData.d);
                let dLat = 0.0;
                let dLon = 0.0;

                if (oData.Chapters.length > 0) {
                    eList.empty();

                    for (let i = 0; i < oData.Chapters.length; i++) {
                        let oItem = oData.Chapters[i];
                        let sCaption = "<span class='IceItemName IceItemChapterName'><b>" + oItem.caption + "</b></span>";
                        let sLocation = "";
                        if (oItem.locationgps)
                            sLocation = "<span class='IceItemNameBadge'>LOC</span>";
                        let sExperience = "<span class='IceItemName'>" + (oItem.experience || '') + "</span>";
                        let sIDs = "<span class='IceItemNameBadge'>" + (oItem.flagsneeded || '') + " &#8594 " + (oItem.chapterid || '') + "</span>";
                        let eItem = $("<div class='IceItem'><span style='margin-right:16px'>" + oItem.id + "</span>" + sCaption + sLocation + sExperience + sIDs + "</div>").appendTo(eList);
                        eItem.data("object", oItem);

                        if (oItem.locationgps) {
                            dLat = oItem.locationgps.split(",")[0];
                            dLon = oItem.locationgps.split(",")[1];
                        }
                    }

                    $(".IceList").on("click", ".IceItemChapterName", function () {
                        let oItem = $(this).parent().data("object");
                        doInsertUpdateChapter($(this), oItem);
                    });
                } else {
                    eList.html("Ekkert fannst");
                }

                eList.prepend("<h2>" + inBookName + "</h2>");

                // Chapter tree
                eList.append("<div class='WorldTree' id='treeid'></div>");
                doDisplayTree(oData.Chapters);

                // Map
                eList.append("<br><div class='WorldMap' style='display:none' id='mapid'></div>");
                doDisplayMap(dLat, dLon, oData.Chapters);

                $(".IceCopyBook").off().on("click", function () {
                    AsyncCallServer("CopyBook", { inID: inBookID }, function (inData) {
                        if (JSON.parse(inData.d) == "1")
                            alert("B\u00f3k afritu\u00f0");
                        else
                            alert(inData.d);
                    });
                });
                $(".IceDump").off().on("click", function () {
                    doDump(inBookID);
                });
                $(".IceNewChapter").off().on("click", function () {
                    doInsertUpdateChapter($(this), { parentid: inBookID });
                });
                $(".IceExport").off().on("click", function () {
                    doExport();
                });
                $(".IceActors").off().on("click", function () {
                    window.open("/static/images/krimmiactors.png", "_blank");
                });
                $(".IceRefresh").off().on("click", function () {
                    let sType = $(".IceList").attr("data-type");
                    if (sType == "books")
                        doRefreshBooks();
                    else
                        doRefreshChapters($(".IceList").attr("data-book"), $(".IceList").attr("data-bookname"));
                });
                $(".IceGoBack").off().on("click", function () {
                    doRefreshBooks();
                });
            });
        }

        // ── Render books ───────────────────────────────────────────────────
        function RenderBooks() {
            let eList = $(".IceList");
            eList.html("Augnablik ...");

            $(".IceList").attr("data-type", "books");
            $(".IceList").attr("data-book", "");
            $(".IceNewBook").show();
            $(".IceWorldMap").show();
            $(".IceNewChapter").hide();
            $(".IceDump").hide();
            $(".IceCopyBook").hide();
            $(".IceGoBack").hide();
            $(".IceActors").hide();

            AsyncCallServer("GetBooks", {}, function (inData) {
                let oData = JSON.parse(inData.d);
                if (oData.Books.length > 0) {
                    eList.empty();
                    eList.html("<div class='IceList'></div>");

                    for (let i = 0; i < oData.Books.length; i++) {
                        let oItem = oData.Books[i];
                        let eItem = $("<div class='IceItem' style='margin-bottom:4px'><span style='margin-right:16px'>" + oItem.id + "</span><span class='IceItemName IceItemBookName'><b>" + oItem.caption + "</b></span>&nbsp;<span style='background-color:lightgray;border-radius:4px;padding:2px'>" + (oItem.location || '') + "</span><span data-bookname='" + oItem.caption + "' data-bookid='" + oItem.id + "' class='IceOpenChapters' style='background-color:green;color:white;padding:2px;border-radius:2px;font-size:80%'>Kaflar</span></div>").appendTo(eList);
                        eItem.data("object", oItem);
                    }

                    $(".IceList").on("click", ".IceItemBookName", function () {
                        let oItem = $(this).parent().data("object");
                        doInsertUpdateBook($(this), oItem);
                    });
                    eList.append("<br><div class='WorldMap' style='display:none' id='mapid'></div>");
                } else {
                    eList.html("Ekkert fannst");
                }

                $(".IceOpenChapters").on("click", function () {
                    RenderChapters($(this).attr("data-bookid"), $(this).attr("data-bookname"));
                });
                $(".IceNewBook").on("click", function () {
                    doInsertUpdateBook($(this), {});
                });
                $(".IceExport").on("click", function () {
                    doExport();
                });
                $(".IceWorldMap").on("click", function () {
                    doDisplayWorldMap();
                });
                $(".IceFetch").off().on("click", function () {
                    window.open("/api/json", "_blank");
                });
                $(".IceRefresh").on("click", function () {
                    let sType = $(".IceList").attr("data-type");
                    if (sType == "books")
                        doRefreshBooks();
                    else
                        doRefreshChapters($(".IceList").attr("data-book"), $(".IceList").attr("data-bookname"));
                });
            });
        }

        $(function () {
            RenderBooks();
        });

    </script>
</head>
<body>
    <div>
        <div class="IceButton IceRefresh">S&aelig;kja aftur</div>
        <div class="IceButton IceNewBook">N&yacute; b&oacute;k</div>
        <div class="IceButton IceCopyBook">Afrita b&oacute;k</div>
        <div class="IceButton IceNewChapter">N&yacute;r kafli</div>
        <div class="IceButton IceGoBack">Tilbaka &iacute; b&aelig;kur</div>
        <div class="IceButton IceActors">Leikarar</div>
        <div class="IceButton IceExport">Export</div>
        <div class="IceButton IceDump">Lesa yfir</div>
        <div class="IceButton IceFetch">S&aelig;kja g&ouml;gn</div>
        <div class="IceButton IceWorldMap">Kort</div>
        <div style="clear:both"></div>
        <hr />
        <div class="IceList" data-type="books" data-book="" data-bookname=""></div>
    </div>
</body>
</html>
